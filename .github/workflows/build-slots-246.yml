name: Upload branch (Node)

on:
  workflow_dispatch:
    inputs:
      publish_url:
        description: "URL de publicación"
        required: true
      publish_key:
        description: "Key de publicación"
        required: true

env:
  PUBLISH_URL: ${{ github.event.inputs.publish_url }}
  PUBLISH_KEY: ${{ github.event.inputs.publish_key }}
  PUBLISH_DIR: ./publish

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      # --------------------
      # Checkout
      # --------------------
      - name: Checkout
        uses: actions/checkout@v4

      # --------------------
      # Zip dist
      # --------------------
      - name: Zip dist folder
        run: |
          zip -r ${ZIP_NAME} .

      # --------------------
      # Deploy
      # --------------------
      - name: Upload ZIP a LIN Cloud IIS Push
        run: |
          curl -X POST \
            "$PUBLISH_URL/api/Publish?createRelease=true" \
            -H "accept: text/plain" \
            -H "Content-Type: multipart/form-data" \
            -H "Key: $PUBLISH_KEY" \
            -F "file=@${ZIP_NAME}"
