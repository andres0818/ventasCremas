name: Deploy Order Service (LIN Cloud)

on:
  push:
    paths:
      - 'apps/services/order-service/**'
    branches: [ "main" ]
  workflow_dispatch: {}

env:
  PUBLISH_URL: ${{ secrets.LIN_CLOUD_URL_ORDER }}
  PUBLISH_KEY: ${{ secrets.LIN_CLOUD_KEY_ORDER }}
  ZIP_NAME: order-service.zip

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create .env file from Secrets
        run: |
          cd apps/services/order-service
          echo "DATABASE_URL=${{ secrets.DATABASE_URL }}" > .env
          echo "FRONTEND_URL=${{ secrets.FRONTEND_URL }}" >> .env
          echo "ORDER_SERVICE_URL=${{ secrets.ORDER_SERVICE_URL }}" >> .env
          echo "PAYMENT_SERVICE_URL=${{ secrets.PAYMENT_SERVICE_URL }}" >> .env
          echo "NODE_ENV=production" >> .env
          echo "PORT=3002" >> .env

      - name: Zip project folder
        run: |
          cd apps/services/order-service && zip -r ../../../${{ env.ZIP_NAME }} . -x "node_modules/*" "test-db.js"

      - name: Verify ZIP existence
        run: |
          if [ -f "${{ env.ZIP_NAME }}" ]; then
            echo "✅ ${{ env.ZIP_NAME }} generado correctamente."
          else
            echo "❌ Error: No se pudo generar el archivo ZIP."
            exit 1
          fi

      - name: Upload ZIP a LIN Cloud
        run: |
          curl -X POST \
            "${{ env.PUBLISH_URL }}/api/Publish?createRelease=true" \
            -H "accept: text/plain" \
            -H "Content-Type: multipart/form-data" \
            -H "Key: ${{ env.PUBLISH_KEY }}" \
            -F "file=@${{ env.ZIP_NAME }}"
