name: Deploy Payment Service

on:
  push:
    paths:
      - 'apps/services/payment-service/**'
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      # Este paso utiliza un Webhook de Render para disparar el despliegue
      # Debes crear un "Web Service" en Render y obtener la URL del Deploy Hook
      - name: Deploy to Render
        run: |
          curl -X POST ${{ secrets.RENDER_PAYMENT_DEPLOY_HOOK }}
